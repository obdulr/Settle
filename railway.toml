[build]
builder = "NIXPACKS"
buildCommand = "cd settle-api && npm install && npm run build"

[deploy]
startCommand = "cd settle-api && node dist/main"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "web"
internal_port = 4025

[[services.ports]]
port = 4025
handlers = ["http"]

[[services.tcp_checks]]
grace_period = "10s"
interval = "15s"
restart_limit = 5
timeout = "2s"
