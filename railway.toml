# Railway Configuration — Settle In Peace
#
# This project deploys TWO services on Railway:
#   1. "api"   — NestJS backend (this file's config)
#   2. "web"   — Next.js frontend (configured via Railway dashboard or railway.web.toml)
#
# To set up in Railway:
#   1. Create a new project from this GitHub repo
#   2. Railway will detect the API service from this railway.toml
#   3. Add a PostgreSQL database service
#   4. Add a second service for the frontend:
#      - Root Directory: settle-web
#      - Build Command: pnpm install && pnpm run build
#      - Start Command: pnpm start
#      - Port: 3025
#      - Env vars: NEXT_PUBLIC_API_URL=<your-api-railway-url>
#   5. Link the Postgres DATABASE_URL to the API service

[build]
builder = "NIXPACKS"
buildCommand = "cd settle-api && pnpm install && pnpm run build"

[deploy]
startCommand = "cd settle-api && pnpm start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "api"
internal_port = 4025

[[services.ports]]
port = 4025
handlers = ["http"]

[[services.tcp_checks]]
grace_period = "10s"
interval = "15s"
restart_limit = 5
timeout = "2s"

# Environment Variables (set these in Railway dashboard)
# Required for API:
# - DATABASE_URL (auto-injected from Postgres service)
# - JWT_SECRET
# - JWT_REFRESH_SECRET
# - NODE_ENV=production
#
# Required for Web:
# - NEXT_PUBLIC_API_URL (the Railway public URL for the API service)
