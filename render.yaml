services:
  - type: web
    name: settle-web
    env: node
    buildCommand: cd settle-web && pnpm install && pnpm run build
    startCommand: cd settle-web && pnpm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api.settleinpeace.com
      - key: NODE_ENV
        value: production
