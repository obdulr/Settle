services:
  - type: web
    name: settle-web
    env: node
    rootDirectory: settle-web
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api.settleinpeace.com
      - key: NODE_ENV
        value: production
