# Railway Configuration — Settle Web (Next.js frontend)
# This file is the config-as-code for the settle-web service.
# In the Railway dashboard, set the Config File path to: /settle-web/railway.toml
# Keep Root Directory as "/" so the Docker build context includes the full monorepo.

[build]
builder = "DOCKERFILE"
dockerfilePath = "settle-web/Dockerfile"

[deploy]
startCommand = "pnpm --filter settle-web start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "web"
internal_port = 3025

[[services.ports]]
port = 3025
handlers = ["http"]
