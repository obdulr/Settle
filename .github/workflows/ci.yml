name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: npm install -g pnpm
      # The lockfile lives at the repo root (pnpm workspace), so install
      # from the root with --frozen-lockfile, then run per-package commands
      # with working-directory set.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: settle-api
        run: pnpm run build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        working-directory: settle-web
        run: pnpm exec tsc --noEmit
      - name: Build
        working-directory: settle-web
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4025

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        working-directory: settle-mobile
        run: npx tsc --noEmit
